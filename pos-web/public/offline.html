<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
    .box { text-align: center; padding: 2rem; max-width: 360px; }
    h1 { color: #333; margin-bottom: 0.5rem; }
    p { color: #666; margin: 0 0 1.5rem; line-height: 1.5; }
    a { color: #1976d2; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>This page didn't load. Data is saved locally and will sync when you're back online.</p>
    <p><a href="/">Home</a> &middot; <a href="/login">Login</a> &middot; <a href="/menu">Menu</a> &middot; <a href="/orders">Orders</a></p>
  </div>
</body>
</html>
